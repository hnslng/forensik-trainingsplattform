<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAB - Interaktives Training</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/editor.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F50D;</text></svg>">
</head>
<body>
  <div id="app">
    <div class="overlay" id="overlay"></div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 id="lab-title">LAB</h1>
        <div class="subtitle" id="lab-subtitle">Interaktives Training</div>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="nav">Navigation</button>
        <button class="sidebar-tab" data-tab="ref">Cheatsheet</button>
        <button class="sidebar-tab" data-tab="editor">Editor</button>
      </div>
      <div class="sidebar-tab-content active" id="sidebar-tab-nav">
        <div class="sidebar-progress">
          <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="progress-text" id="progress-text">0 / 0 Kapitel abgeschlossen</div>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </div>
      <div class="sidebar-tab-content" id="sidebar-tab-ref">
        <div id="reference-body"></div>
        <div class="sidebar-footer-ref">
          <button class="pdf-export-btn" onclick="window.print()">&#128196; Als PDF exportieren</button>
        </div>
      </div>
      <div class="sidebar-tab-content" id="sidebar-tab-editor">
        <div id="editor-sidebar"></div>
      </div>
      <div class="sidebar-footer">
        <a href="/" class="sidebar-link">&#127968; Zur Hauptseite</a>
        <button id="reset-progress-btn">Fortschritt zurücksetzen</button>
      </div>
      <button class="sidebar-close-mobile" id="sidebar-close-mobile">&times;</button>
    </aside>

    <div id="main">
      <header id="topbar">
        <button id="menu-toggle">&#9776;</button>
        <div class="breadcrumb" id="breadcrumb">
          <span>LAB</span> / Willkommen
        </div>
        <div class="topbar-actions">
          <div id="slide-nav-topbar"></div>
          <button class="topbar-btn" id="terminal-toggle">&#128187; Terminal</button>
          <button class="topbar-btn" id="cheatsheet-toggle">&#128220; Cheatsheet</button>
        </div>
      </header>
      <div id="main-content">
        <div id="content"></div>
      </div>
      <div id="scroll-fade"></div>
      <div id="terminal-bottom">
        <div class="terminal-resize-handle" id="terminal-resize-handle"></div>
        <div id="terminal-container"></div>
      </div>
    </div>
    <div class="cheatsheet-overlay" id="cheatsheet-overlay">
      <div class="cheatsheet-overlay-inner" id="cheatsheet-content"></div>
    </div>
  </div>

  <!-- LAB_CONFIG -->
  <script src="assets/js/markdown-loader.js"></script>
  <script src="assets/js/terminal.js"></script>
  <script src="assets/js/reference.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cheatsheet-overlay.js"></script>
  <script src="assets/js/editor.js"></script>
</body>
</html>
